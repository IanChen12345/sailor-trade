<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雷鳴交易策略中控室</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>⚡ 雷鳴交易策略中控室</h1>
            <p>工欲善其事，必先利其器。拒絕多巴胺，專注價值投資。</p>
        </header>

        <main class="dashboard">
            <section class="quick-links">
                <h2>🔗 常用傳送門</h2>
                <div class="link-grid" id="linkGrid">
                    </div>
            </section>

            <section class="strategy-log">
                <h2>📝 交易策略日誌</h2>
                <div class="input-group">
                    <input type="text" id="strategyInput" placeholder="輸入新的交易策略或觀察...">
                    <button onclick="addStrategy()">記錄策略</button>
                </div>
                <ul id="strategyList">
                    </ul>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
